version: 2
updates:
  # Keep the GitHub Actions used in CI up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ['*']

  # Keep Python dependencies up to date (Dependabot reads pyproject.toml + uv.lock).
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
        patterns: ['*']
